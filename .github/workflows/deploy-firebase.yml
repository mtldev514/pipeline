name: Deploy to Firebase Hosting

on:
  workflow_call:
    inputs:
      node-version:
        description: Node.js version
        type: string
        default: "20"
      install-command:
        description: Install command
        type: string
        default: "npm ci"
      build-command:
        description: Build command
        type: string
        default: "npm run build"
      skip-build:
        description: Skip install and build steps (deploy pre-built files)
        type: boolean
        default: false
      firebase-project-id:
        description: Firebase project ID (required)
        type: string
        required: true
    secrets:
      FIREBASE_SERVICE_ACCOUNT:
        required: true

concurrency:
  group: firebase-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        if: ${{ !inputs.skip-build }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: npm

      - name: Install dependencies
        if: ${{ !inputs.skip-build }}
        run: ${{ inputs.install-command }}

      - name: Build
        if: ${{ !inputs.skip-build }}
        run: ${{ inputs.build-command }}

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ github.token }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: ${{ inputs.firebase-project-id }}
          channelId: ${{ github.event_name == 'push' && 'live' || '' }}

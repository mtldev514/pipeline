name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run typecheck
      - run: npm run build

      - name: Check dist is up to date
        run: |
          git diff --exit-code deploy-vercel/dist/ apply-migration/dist/ publish-npm/dist/ || {
            echo "::error::dist/ is out of date. Run 'npm run build' and commit the result."
            exit 1
          }
